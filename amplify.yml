version: 1
backend:
  phases:
    build:
      commands:
        # エージェントのDockerイメージをCDKアセットとしてビルドするための準備
        # （ビルドイメージを public.ecr.aws/codebuild/amazonlinux-x86_64-standard:5.0 に変更しておくこと）
        - /usr/local/bin/dockerd-entrypoint.sh
        # x86_64のビルド環境でARM64イメージを作るためのエミュレーション設定
        - docker run --privileged --rm tonistiigi/binfmt --install arm64
        - corepack enable
        - pnpm install --frozen-lockfile
        - pnpm ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
